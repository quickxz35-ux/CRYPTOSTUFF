<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Screener | Phase 1</title>
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0d1117;
  color: #c9d1d9;
  line-height: 1.5;
}
.container { max-width: 1400px; margin: 0 auto; padding: 20px; }

header {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 15px;
  border-bottom: 1px solid #30363d;
  margin-bottom: 15px;
}
h1 { font-size: 1.5rem; color: #58a6ff; }

.controls, .filters {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}

select, button, input {
  background: #21262d;
  border: 1px solid #30363d;
  color: #c9d1d9;
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 0.9rem;
}
button {
  background: #238636;
  border-color: #238636;
  cursor: pointer;
}
button:hover { background: #2ea043; }
button:disabled { opacity: 0.5; cursor: not-allowed; }

.filters {
  padding: 10px;
  background: #161b22;
  border-radius: 8px;
  margin-bottom: 15px;
}
.filters label { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; }
.filters input[type="checkbox"] { width: auto; }

.status {
  padding: 12px;
  background: #161b22;
  border-radius: 8px;
  margin-bottom: 15px;
  text-align: center;
  color: #8b949e;
}
.status.loading { color: #58a6ff; }
.status.error { color: #f85149; background: #3d0c0c; }
.status.success { color: #3fb950; }

.results { display: grid; gap: 12px; }

.card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 10px;
  padding: 16px;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.1s;
}
.card:hover { border-color: #58a6ff; transform: translateY(-2px); }
.card.LONG { border-left: 4px solid #3fb950; }
.card.SHORT { border-left: 4px solid #f85149; }

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.symbol { font-size: 1.3rem; font-weight: 600; color: #f0f6fc; }
.side-badge {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
}
.side-badge.LONG { background: rgba(63, 185, 80, 0.2); color: #3fb950; }
.side-badge.SHORT { background: rgba(248, 81, 73, 0.2); color: #f85149; }

.card-scores {
  display: flex;
  gap: 20px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.score-box { text-align: center; }
.score-box .label { font-size: 0.7rem; color: #8b949e; text-transform: uppercase; }
.score-box .value { font-size: 1.4rem; font-weight: 700; }
.score-box .value.high { color: #3fb950; }
.score-box .value.med { color: #d29922; }
.score-box .value.low { color: #8b949e; }

.card-metrics {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 8px;
  font-size: 0.8rem;
  color: #8b949e;
}
.metric { display: flex; justify-content: space-between; }
.metric span:last-child { color: #c9d1d9; font-weight: 500; }

.card-why {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid #30363d;
  font-size: 0.8rem;
  color: #8b949e;
}

.entry-plan {
  margin-top: 12px;
  padding: 12px;
  background: #0d1117;
  border-radius: 6px;
  font-size: 0.85rem;
}
.entry-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
}
.entry-row .label { color: #8b949e; }
.entry-row .value { font-family: monospace; }

.modal {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.modal.hidden { display: none; }
.modal-content {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 12px;
  width: 90%;
  max-width: 800px;
  max-height: 90vh;
  overflow-y: auto;
  padding: 20px;
}
.close {
  float: right;
  font-size: 1.5rem;
  cursor: pointer;
  color: #8b949e;
}
.close:hover { color: #f0f6fc; }
.chart { height: 300px; background: #0d1117; border-radius: 8px; margin: 15px 0; }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: #8b949e;
}
.empty-state h3 { color: #c9d1d9; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎯 Phase 1 Screener</h1>
      <div class="controls">
        <select id="timeframe">
          <option value="5m" selected>5m</option>
          <option value="15m">15m</option>
          <option value="1h">1h</option>
          <option value="4h">4h</option>
        </select>
        <select id="view">
          <option value="discovery" selected>Discovery View</option>
          <option value="entries">Entry Setups</option>
          <option value="all">All Signals</option>
        </select>
        <button id="refreshBtn">↻ Refresh</button>
      </div>
    </header>

    <div class="filters">
      <label><input type="checkbox" id="filterLong" checked> LONG</label>
      <label><input type="checkbox" id="filterShort" checked> SHORT</label>
      <label>Min Confidence: <input type="range" id="minConf" min="0" max="100" value="45"> <span id="confVal">45</span></label>
      <label>Top: <input type="number" id="topN" value="20" min="5" max="50" style="width:60px;"></label>
    </div>

    <div id="status" class="status">Loaded with demo data. Filters work instantly.</div>

    <div id="results" class="results"></div>

    <div id="detailModal" class="modal hidden">
      <div class="modal-content">
        <span class="close">&times;</span>
        <h2 id="detailTitle"></h2>
        <div id="detailChart" class="chart"></div>
        <div id="detailData"></div>
      </div>
    </div>
  </div>

  timeframe: '5m',
  providers: ['binance'],
  mode: 'union'

const UI = {
  statusEl: document.getElementById('status'),
  resultsEl: document.getElementById('results'),
  refreshBtn: document.getElementById('refreshBtn'),
  timeframe: document.getElementById('timeframe'),
  view: document.getElementById('view'),
  filterLong: document.getElementById('filterLong'),
  filterShort: document.getElementById('filterShort'),
  minConf: document.getElementById('minConf'),
  confVal: document.getElementById('confVal'),
  topN: document.getElementById('topN'),
  modal: document.getElementById('detailModal'),
  modalClose: document.querySelector('.close'),
  
  setStatus(msg, type = 'info') {
    this.statusEl.textContent = msg;
    this.statusEl.className = 'status ' + (type === 'loading' ? 'loading' : type === 'error' ? 'error' : type === 'success' ? 'success' : '');
  },
  
  formatNum(n, digits = 2) {
    if (n === undefined || n === null) return '-';
    return Number(n).toFixed(digits);
  },
  
  getScoreClass(val) {
    if (val >= 70) return 'high';
    if (val >= 50) return 'med';
    return 'low';
  },
  
  renderCard(item) {
    const view = this.view.value;
    const showDiscovery = view === 'discovery' || view === 'all';
    const showEntry = view === 'entries' || (view === 'all' && item.entryLow);
    
    let html = `
      <div class="card ${item.side}" data-symbol="${item.symbol}">
        <div class="card-header">
          <span class="symbol">${item.symbol}</span>
          <span class="side-badge ${item.side}">${item.side}</span>
        </div>
        <div class="card-scores">
          <div class="score-box">
            <div class="label">Confidence</div>
            <div class="value ${this.getScoreClass(item.confidence)}">${this.formatNum(item.confidence, 1)}</div>
          </div>
          ${showDiscovery ? `
          <div class="score-box">
            <div class="label">Discovery</div>
            <div class="value ${this.getScoreClass(item.discoveryScore)}">${this.formatNum(item.discoveryScore, 1)}</div>
          </div>
          ` : ''}
          ${item.rr ? `
          <div class="score-box">
            <div class="label">R:R</div>
            <div class="value ${item.rr >= 2 ? 'high' : item.rr >= 1.5 ? 'med' : 'low'}">${this.formatNum(item.rr, 1)}</div>
          </div>
          ` : ''}
        </div>
        <div class="card-metrics">
          <div class="metric"><span>Price</span><span>$${this.formatNum(item.price, item.price < 1 ? 6 : 2)}</span></div>
          <div class="metric"><span>RSI</span><span>${this.formatNum(item.rsi14, 1)}</span></div>
          <div class="metric"><span>Vol</span><span>${this.formatNum(item.volSpike, 1)}x</span></div>
          <div class="metric"><span>OIΔ</span><span>${this.formatNum(item.oiDeltaPct, 2)}%</span></div>
          <div class="metric"><span>Funding</span><span>${this.formatNum(item.funding * 100, 4)}%</span></div>
          <div class="metric"><span>Taker</span><span>${this.formatNum(item.takerRatio, 2)}</span></div>
          <div class="metric"><span>Whale</span><span>${this.formatNum(item.whaleScore, 0)}</span></div>
          <div class="metric"><span>S/R Prox</span><span>${this.formatNum(item.srProximity, 0)}</span></div>
        </div>
    `;
    
    if (showEntry && item.entryLow) {
      html += `
        <div class="entry-plan">
          <div class="entry-row"><span class="label">Entry Zone</span><span class="value">${this.formatNum(item.entryLow, 6)} - ${this.formatNum(item.entryHigh, 6)}</span></div>
          <div class="entry-row"><span class="label">Stop Loss</span><span class="value" style="color:#f85149">${this.formatNum(item.stop, 6)}</span></div>
          <div class="entry-row"><span class="label">TP1 / TP2</span><span class="value" style="color:#3fb950">${this.formatNum(item.tp1, 6)} / ${this.formatNum(item.tp2, 6)}</span></div>
          <div class="entry-row"><span class="label">Size (Risk $${item.riskUsd})</span><span class="value">${this.formatNum(item.sizeUnits, 4)} units</span></div>
          <div class="entry-row" style="margin-top:8px;font-size:0.75rem;color:#8b949e"><span>Invalidation:</span> ${item.invalidation}</div>
        </div>
      `;
    }
    
    if (item.why || item.discoveryWhy) {
      html += `<div class="card-why">${item.discoveryWhy ? `<strong>Discovery:</strong> ${item.discoveryWhy}<br>` : ''}${item.why ? `<strong>Setup:</strong> ${item.why}` : ''}</div>`;
    }
    
    html += '</div>';
    return html;
  },
  
  renderEmpty(msg = 'No signals found') {
    return `<div class="empty-state"><h3>${msg}</h3><p>Try adjusting filters</p></div>`;
  },
  
  filterData(data) {
    let filtered = data.data || [];
    
    const allowLong = this.filterLong.checked;
    const allowShort = this.filterShort.checked;
    filtered = filtered.filter(i => (i.side === 'LONG' && allowLong) || (i.side === 'SHORT' && allowShort));
    
    const minConf = parseInt(this.minConf.value);
    filtered = filtered.filter(i => i.confidence >= minConf);
    
    const topN = parseInt(this.topN.value);
    filtered = filtered.slice(0, topN);
    
    return filtered;
  },
  
  render() {
    const filtered = this.filterData(MOCK_DATA);
    if (!filtered.length) {
      this.resultsEl.innerHTML = this.renderEmpty();
      return;
    }
    this.resultsEl.innerHTML = filtered.map(item => this.renderCard(item)).join('');
    
    this.resultsEl.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', () => this.showDetail(card.dataset.symbol));
    });
    
    const count = filtered.length;
    this.setStatus(`Showing ${count} signals | Filters: ${this.view.value} view`, 'success');
  },
  
  showDetail(symbol) {
    document.getElementById('detailTitle').textContent = symbol;
    this.modal.classList.remove('hidden');
    document.getElementById('detailData').innerHTML = '<p>Real-time chart requires live API connection.</p>';
  },
  
  hideDetail() {
    this.modal.classList.add('hidden');
  }
};

// Event handlers
UI.refreshBtn.addEventListener('click', () => {
  UI.render();
});

UI.minConf.addEventListener('input', (e) => {
  UI.confVal.textContent = e.target.value;
  UI.render();
});

[UI.filterLong, UI.filterShort, UI.topN, UI.view].forEach(el => {
  el.addEventListener('change', () => UI.render());
});

UI.modalClose.addEventListener('click', () => UI.hideDetail());
UI.modal.addEventListener('click', (e) => {
  if (e.target === UI.modal) UI.hideDetail();
});

// Initial render
UI.render();
  </script>
</body>
</html>
